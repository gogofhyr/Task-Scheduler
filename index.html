<!DOCTYPE html>
<html>

<head>

<title>AI Focus Scheduler</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
background-image:url("https://wallpapercg.com/media/ts_orig/20866.webp");
background-size:cover;
background-position:center;
background-attachment:fixed;
font-family:"Poppins",sans-serif;
margin:0;
height:100vh;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.main{
width:550px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-align:center;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
font-weight:600;
}

.manual input,
.manual select{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

ul{
list-style:none;
margin-top:20px;
padding:0;
}

li{
background:rgba(0,0,0,0.6);
padding:15px;
margin:10px;
border-radius:10px;
}

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#timer{
font-size:100px;
color:#00ff9d;
margin:20px;
}

</style>

</head>

<body>

<div class="main">

<h1>🔥 AI Focus Scheduler</h1>

<button onclick="startAI()">🤖 Generate AI Plan</button>

<button onclick="enableFocus()">🔒 Enable Focus Mode</button>

<hr>

<h2>📅 Manual Timetable</h2>

<div class="manual">

<input id="taskName" placeholder="Task Name">

<select id="taskDay">

<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>

</select>

<input type="date" id="taskDate">

<input type="time" id="taskTime">

<input type="number" id="taskDuration" placeholder="Duration (minutes)">

<br>

<button onclick="addManualTask()">➕ Add Task</button>

</div>

<hr>

<h2>📋 Scheduled Tasks</h2>

<ul id="taskList"></ul>

</div>

<div id="lockScreen">

<h2 id="currentTask"></h2>

<h3 id="taskDateShow"></h3>

<h1 id="timer"></h1>

<button onclick="simulateCall()">📞 Emergency Call</button>

</div>

<script src="script.js"></script>

</body>
</html>
